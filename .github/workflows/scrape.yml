name: Daily OSINT Scrape

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write  # Explicitly gives the robot permission to save files

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5  # Updated to v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests pyarrow

      - name: Run Scraper
        run: python update_data.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add nova_data.parquet
          git commit -m "Auto-update: Latest NOVA Intelligence Data" || exit 0
          git push
