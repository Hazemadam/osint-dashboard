name: Daily OSINT & Census Scrape

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every night at midnight
  workflow_dispatch:      # Allows you to run it manually

permissions:
  contents: write         # Allows the robot to save the .parquet files

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # This line tells the robot to look at your requirements.txt 
          # and install pandas, requests, census, and us.

      - name: Run Scraper
        run: python update_data.py
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }} 
          # If you want to be extra secure, you can put your key in GitHub Secrets,
          # but since we hardcoded it in update_data.py for now, this is fine.

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add nova_data.parquet vulnerability_data.parquet
          git commit -m "Auto-update: Intelligence & Vulnerability Data" || exit 0
          git push
